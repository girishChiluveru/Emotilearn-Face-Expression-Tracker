name: Emotilearn Deploy Pipeline

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com
  PUBLIC_EC2_HOST: ${{ secrets.PUBLIC_EC2_HOST }}       # Public IP/Elastic IP
  PRIVATE_EC2_HOST: ${{ secrets.PRIVATE_EC2_HOST }}     # Private IP (e.g. 10.0.x.x)
  SSH_USER: ubuntu

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # ── Set up Node & Build Frontend ──────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: './Front-end/package-lock.json'

      - name: Install Frontend Dependencies
        run: |
          cd Front-end
          npm ci

      - name: Build Frontend React App
        env:
          VITE_API_URL: https://project.girishchiluveru.me/api
          VITE_WS_URL: https://project.girishchiluveru.me
        run: |
          cd Front-end
          npm run build

      # ── Authenticate with AWS ─────────────────────────────────────────────────
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      # ── Build & Push ML Image ──────────────────────────────────────────────────
      - name: Build & Push ML Image
        run: |
          docker build -t $ECR_REGISTRY/prod-emotilearn-ml:latest ./TransformerModel
          docker push $ECR_REGISTRY/prod-emotilearn-ml:latest

      # ── Build & Push Backend Image ─────────────────────────────────────────────
      - name: Build & Push Backend Image
        run: |
          docker build -t $ECR_REGISTRY/prod-emotilearn-backend:latest ./Back-end
          docker push $ECR_REGISTRY/prod-emotilearn-backend:latest

      # ── Configure SSH Key for Deployment ────────────────────────────────────────
      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: 'unnecessary'
          if_key_exists: replace

      - name: Add Hosts to Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.PUBLIC_EC2_HOST }} >> ~/.ssh/known_hosts

      # ── Deploy Frontend Static Assets to Public EC2 ─────────────────────────────
      - name: Deploy Frontend to Public EC2
        run: |
          # Create directory on Public EC2 if not exists
          ssh ${{ env.SSH_USER }}@${{ env.PUBLIC_EC2_HOST }} "sudo mkdir -p /var/www/frontend && sudo chown -R ubuntu:ubuntu /var/www/frontend"
          # Sync build folder using rsync
          rsync -avz --delete Front-end/dist/ ${{ env.SSH_USER }}@${{ env.PUBLIC_EC2_HOST }}:/var/www/frontend/

      # ── Create Production docker-compose.yml ─────────────────────────────────────
      - name: Create Production docker-compose.yml
        run: |
          cat << 'EOF' > docker-compose.yml
          version: '3.8'
          
          services:
            ml:
              image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com/prod-emotilearn-ml:latest
              container_name: emotilearn-ml
              expose:
                - "8000"
              environment:
                - PORT=8000
                - HOST=0.0.0.0
                - ALLOWED_ORIGINS=http://localhost:3000,https://project.girishchiluveru.me
              restart: always
              networks:
                - emotilearn-network
          
            backend:
              image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com/prod-emotilearn-backend:latest
              container_name: emotilearn-backend
              ports:
                - "3000:3000"
              environment:
                - PORT=3000
                - NODE_ENV=production
                - CONNECTION_STRING=${{ secrets.DB_CONNECTION_STRING }}
                - AI_SERVICE_URL=http://ml:8000
                - FRONTEND_URL=https://project.girishchiluveru.me
                - SOCKET_CORS_ORIGIN=https://project.girishchiluveru.me
                - JWT_SECRET=${{ secrets.JWT_SECRET }}
                - ADMIN_JWT_SECRET=${{ secrets.ADMIN_JWT_SECRET }}
              depends_on:
                - ml
              restart: always
              networks:
                - emotilearn-network
          
          networks:
            emotilearn-network:
              driver: bridge
          EOF

      # ── Deploy Containers to Private EC2 via SSH ProxyCommand ────────────────────
      - name: Deploy Containers to Private EC2
        run: |
          # Copy docker-compose.yml directly to Private EC2 via Public EC2 Bastion
          scp -o StrictHostKeyChecking=no -o ProxyCommand="ssh -o StrictHostKeyChecking=no -W %h:%p ${{ env.SSH_USER }}@${{ env.PUBLIC_EC2_HOST }}" docker-compose.yml ${{ env.SSH_USER }}@${{ env.PRIVATE_EC2_HOST }}:/home/ubuntu/docker-compose.yml

          # Run deployment commands directly on the Private EC2 via Public EC2 Bastion
          ssh -o StrictHostKeyChecking=no -o ProxyCommand="ssh -o StrictHostKeyChecking=no -W %h:%p ${{ env.SSH_USER }}@${{ env.PUBLIC_EC2_HOST }}" ${{ env.SSH_USER }}@${{ env.PRIVATE_EC2_HOST }} << 'EOF'
            # Install Docker if not present
            if ! command -v docker &> /dev/null; then
              sudo apt-get update
              sudo apt-get install -y docker.io docker-compose-v2
              sudo usermod -aG docker ubuntu
            fi
            
            # AWS CLI login helper to fetch latest docker images from ECR
            aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com
            
            # Pull and update containers
            docker compose pull
            docker compose down
            docker compose up -d
            
            # Clean up dangling images to save disk space
            docker image prune -f
          EOF
