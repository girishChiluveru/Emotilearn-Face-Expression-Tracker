# Nginx Configuration Template for Emotilearn public instance
# Place in: /etc/nginx/sites-available/emotilearn

server {
    listen 80;
    server_name project.girishchiluveru.me;

    # Certbot challenge location (critical for SSL acquisition)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name project.girishchiluveru.me;

    # SSL Certificates (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/project.girishchiluveru.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/project.girishchiluveru.me/privkey.pem;

    # Security configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # Root directory for built React frontend
    root /var/www/frontend;
    index index.html;

    # React Router single-page application fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy for backend express API
    location /api/ {
        proxy_pass http://10.0.2.97:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Reverse proxy for Socket.io websocket streaming
    location /socket.io/ {
        proxy_pass http://10.0.2.97:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400; # keep connections open
    }
}
